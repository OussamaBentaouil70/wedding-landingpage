    <title>Kech Weddings | Luxury Wedding Planner Marrakech</title>
    <link rel="icon" type="image/png" href="/src/assets/Images/logo.png" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch in an environment where it's read-only.
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { /* Ignore attempts to overwrite fetch */ },
            configurable: true
          });
        } catch (e) {
          // If we can't redefine it, we just hope for the best
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
